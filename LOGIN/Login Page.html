<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> J-COMPANY </title>
    <link rel="icon" href="j logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="login.css">

</head>
<body>
  <div id= "reveal" class="login-container">
    <h2><span><b>Login</b></span></h2> 
    <form action="#" method="post">
      <input type="text" placeholder="Username" name="username" required>
      <input type="password" placeholder="Password" name="password" required>
      <div class="submit">
          <button type="submit"><b>Login</b></button>
      </div>
      <div class="forgot">
          <a href="#" target="_blank"><i>Forgot password?</i></a>
      </div>
      <div class="register">
      <p>Don't have an account? <a href="register.html" target="_blank"><i>Register!</i></a></p>
      </div>
    </form>
  </div>
</body>
</html>
